<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>适老化安全评估 · 居家安全AI评估</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333;line-height:1.6}
header{background:#fff;padding:16px 24px;box-shadow:0 1px 3px rgba(0,0,0,.1);display:flex;align-items:center;gap:12px}
header h1{font-size:18px;color:#1a73e8}
header span{font-size:12px;color:#888;margin-left:auto}
.phase-tabs{display:flex;background:#fff;border-bottom:1px solid #ddd;padding:0 16px}
.phase-tab{padding:12px 20px;cursor:pointer;font-size:14px;border-bottom:3px solid transparent;color:#666;transition:.2s}
.phase-tab.active{color:#1a73e8;border-color:#1a73e8;font-weight:600}
.phase-tab:hover{color:#1a73e8}
.phase-tab .badge{display:inline-block;margin-left:6px;font-size:11px;padding:1px 8px;border-radius:10px;color:#fff}
.phase-tab .badge.l0{background:#d32f2f}
.phase-tab .badge.l1{background:#f57c00}
.phase-tab .badge.l2{background:#388e3c}
.container{max-width:720px;margin:0 auto;padding:20px 16px}
.question-card{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.q-level{font-size:11px;color:#fff;padding:2px 10px;border-radius:4px;display:inline-block;margin-bottom:8px}
.q-level.l0{background:#d32f2f}
.q-level.l1{background:#f57c00}
.q-level.l2{background:#388e3c}
.q-text{font-size:16px;font-weight:500;margin-bottom:12px;line-height:1.5}
.q-source{font-size:11px;color:#999;margin-bottom:12px}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:8px;cursor:pointer;transition:.15s}
.option:hover{border-color:#90caf9;background:#f5f9ff}
.option.selected{border-color:#1a73e8;background:#e8f0fe}
.option input{margin-top:2px;accent-color:#1a73e8}
.option-text{font-size:14px;line-height:1.4}
.option-points{font-size:11px;color:#888;margin-top:2px}
.nav-row{display:flex;gap:12px;margin-top:20px}
.btn{padding:12px 28px;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:500;transition:.15s}
.btn-primary{background:#1a73e8;color:#fff}
.btn-primary:hover{background:#1557b0}
.btn-secondary{background:#e0e0e0;color:#555}
.btn-secondary:hover{background:#ccc}
.btn-success{background:#388e3c;color:#fff}
.btn-success:hover{background:#2e7d32}
.btn:disabled{opacity:.4;cursor:not-allowed}
.progress{height:4px;background:#e0e0e0;border-radius:2px;margin:0 0 16px}
.progress-bar{height:100%;background:#1a73e8;border-radius:2px;transition:width .3s}
.q-counter{text-align:center;font-size:13px;color:#888;margin-bottom:8px}
.result-module{margin-bottom:20px}
.result-module h3{font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.score-bar{height:20px;background:#e0e0e0;border-radius:10px;overflow:hidden;position:relative;margin-bottom:4px}
.score-fill{height:100%;border-radius:10px;transition:width .8s;position:relative}
.score-label{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:#fff;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.grade-badge{font-size:28px;font-weight:700;text-align:center;padding:20px;border-radius:12px;margin-bottom:16px}
.grade-A{background:#e8f5e9;color:#2e7d32}
.grade-B{background:#fff8e1;color:#f57c00}
.grade-C{background:#fce4ec;color:#c62828}
.grade-D{background:#ffebee;color:#b71c1c}
.grade-E{background:#f3e5f5;color:#6a1b9a}
.risk-tag{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;margin:3px;font-weight:500}
.risk-high{background:#ffcdd2;color:#c62828}
.risk-mid{background:#fff3e0;color:#e65100}
.report-section{background:#fff;border-radius:12px;padding:20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.hidden{display:none}

/* 留资弹窗 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px;padding:32px 28px;max-width:400px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h3{font-size:18px;margin-bottom:6px}
.modal .sub{font-size:13px;color:#666;line-height:1.6;margin-bottom:20px}
.modal input{width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:12px;outline:none;transition:.15s}
.modal input:focus{border-color:#1a73e8}
.modal .error-msg{font-size:12px;color:#d32f2f;margin-bottom:8px;display:none}
.modal .loading{font-size:13px;color:#888;margin:12px 0;display:none}
.modal .success{display:none;padding:16px 0}
.modal .success .icon{font-size:48px;margin-bottom:8px}
.modal .success p{font-size:14px;color:#555;line-height:1.6}

@media(max-width:480px){.container{padding:12px 10px}.question-card{padding:16px;margin-bottom:10px}.phase-tab{padding:10px 12px;font-size:12px}}
</style>
</head>

// ═══════════════════════════════════════════════════════════
// 应用程序
// ═══════════════════════════════════════════════════════════
let answers = {};        // {qId: selectedOptionIndex}
let currentPhase = 'intro';

const PHASES = ['intro','l0','l1','l2','report'];
const L0_IDS = Q.l0.map(q=>q.id);
const L1_IDS = Q.l1.map(q=>q.id);
const L2_IDS = [...Q.l2_floor,...Q.l2_bath,...Q.l2_light,...Q.l2_kitchen,...Q.l2_storage,...Q.l2_smart].map(q=>q.id);
const ALL_QUESTIONS = [...Q.l0,...Q.l1,...Q.l2_floor,...Q.l2_bath,...Q.l2_light,...Q.l2_kitchen,...Q.l2_storage,...Q.l2_smart];

function render(){
  const app = document.getElementById('app');
  switch(currentPhase){
    case 'intro': app.innerHTML = renderIntro(); break;
    case 'l0': app.innerHTML = renderQuestionGroup('L0 基本居住保障', Q.l0, 'l0', '继续 → L1 门洞通行'); break;
    case 'l1': app.innerHTML = renderQuestionGroup('L1 门洞与通行', Q.l1, 'l1', '继续 → L2 适老化评估'); break;
    case 'l2': app.innerHTML = renderL2All(); break;
    case 'report': app.innerHTML = renderReport(); break;
    case 'brief': app.innerHTML = renderBriefReport(); break;
  }
  updateTabs();
}

function updateTabs(){
  document.querySelectorAll('.phase-tab').forEach(t=>{
    const isActive = t.dataset.phase === currentPhase ||
      (currentPhase === 'brief' && t.dataset.phase === 'report');
    t.classList.toggle('active', isActive);
  });
}

// ═══════════════════════════════════════════════════════════
// 首页
// ═══════════════════════════════════════════════════════════
function renderIntro(){

// ═══════════════════════════════════════════════════════════
// 报告
// ═══════════════════════════════════════════════════════════
function calcScore(){
  function compute(questions, maxScore){
    let raw=0, min=0;
    questions.forEach(q=>{
      const sel = answers[q.id];
      if(sel===undefined) return;
      raw += q.options[sel].score;
      const minOpt = Math.min(...q.options.map(o=>o.score));
      min += minOpt;
    });
    return {raw, max:maxScore, min};
  }
  
  const l0Score = compute(Q.l0, 30);    // 5+5+5+3+4+3+3+2=30
  const l1Score = compute(Q.l1, 10);    // 4+3+3=10
  const l2F = compute(Q.l2_floor, 15);
  const l2B = compute(Q.l2_bath, 15);
  const l2L = compute(Q.l2_light, 10);
  const l2K = compute(Q.l2_kitchen, 10);
  const l2S = compute(Q.l2_storage, 5);
  const l2Sm = compute(Q.l2_smart, 5);
  
  const l2Total = {raw: l2F.raw + l2B.raw + l2L.raw + l2K.raw + l2S.raw + l2Sm.raw, max: 60};
  
  // 综合评分（L0:25% + L1:10% + L2:65%）
  const l0Pct = l0Score.max>0 ? Math.max(0, l0Score.raw/l0Score.max) : 0;
  const l1Pct = l1Score.max>0 ? Math.max(0, l1Score.raw/l1Score.max) : 0;
  const l2Pct = l2Total.max>0 ? Math.max(0, l2Total.raw/l2Total.max) : 0;
  
  const score = Math.round((l0Pct*25 + l1Pct*10 + l2Pct*65));
  
  // L0 否决
  const l0Raw = l0Score.raw;
  
  // 等级
  let grade, gradeClass;
  if(l0Raw < 0) { grade='E'; gradeClass='grade-E'; }
  else if(score>=90) { grade='A'; gradeClass='grade-A'; }
  else if(score>=70) { grade='B'; gradeClass='grade-B'; }
  else if(score>=50) { grade='C'; gradeClass='grade-C'; }
  else if(score>=30) { grade='D'; gradeClass='grade-D'; }
  else { grade='E'; gradeClass='grade-E'; }
  
  // 风险标签
  const risks = {high:[], mid:[]};
  const riskMap = {
    'S01_C':'🔴 结构安全隐患','S02_C':'🔴 屋面渗漏','S03_C':'🟡 单层玻璃透风','E01_C':'🔴 电路老化漏电',
    'E02_C':'🔴 无漏电保护','E03_C':'🟡 排水反味','D01_C':'🟡 入户门偏窄',
    'F01_C':'🔴 地面湿滑','F02_C':'🔴 门槛绊倒','F03_C':'🟡 地面散落物','B01_C':'🔴 无扶手如厕',
    'B03_C':'🔴 浴缸跨入','B05_C':'🟡 内开门空间小','B06_C':'🔴 无紧急呼叫','L01_C':'🔴 摸黑行走',
    'L02_C':'🟡 开关不便','L03_C':'🟡 照明不足','K01_C':'🔴 无燃气保护','K02_C':'🟡 无报警器',
    'I01_C':'🟡 无呼救设备'
  };
  Object.keys(answers).forEach(qId=>{
    const idx = answers[qId];
    if(idx === undefined) return;
    // 取到最后一个选项（下标2或3）则标记风险
    const q = ALL_QUESTIONS.find(x=>x.id===qId);
    if(!q) return;
    const lastIdx = q.options.length-1;
    const key = qId+(idx===lastIdx?'_C':'');
    if(idx===lastIdx && riskMap[key]){
      if(key.startsWith('S')||key.startsWith('E')||key.startsWith('F')||key==='B01_C'||key==='B03_C'||key==='B06_C'||key==='L01_C'||key==='K01_C'){
        risks.high.push(riskMap[key]);
      } else {
        risks.mid.push(riskMap[key]);
      }
    }
  });
  
  return {score, grade, gradeClass, l0Raw, l0Pct, l1Pct, l2Pct,
    l0Score, l1Score, l2F, l2B, l2L, l2K, l2S, l2Sm,
    risks};
}

         '智能看护设备',
         '适老家具更新'
       ]}
    ];
  } else {
    budgetDesc = [
      {level:'针对性优化（约5k元以内）',
       items:[
         '根据报告中的建议项逐项针对性加装或更换',
         '继续保持定期复评'
       ]}
    ];
  }
  
  html += `
    <div class="report-section">
      <h3>💰 改造方案参考</h3>
      ${budgetDesc.map(b=>`
        <div style="margin:10px 0;padding:10px 12px;background:#fafafa;border-radius:8px">
          <div style="font-weight:500;font-size:13px;margin-bottom:4px">${b.level}</div>
          <ul style="margin:0;padding-left:16px;font-size:12px;color:#555;line-height:1.7">
            ${b.items.map(i=>`<li>${i}</li>`).join('')}
          </ul>
        </div>
      `).join('')}
    </div>
  `;
  
  // 免责声明
  html += `
    <div class="report-section" style="background:#fafafa;border:1px solid #e0e0e0">
      <h3 style="font-size:13px;color:#888">⚖️ 免责声明</h3>
      <p style="font-size:12px;color:#999;line-height:1.5;margin-top:4px">
        本评估结果基于用户提供的问答信息自动生成，仅作为居家安全参考，不构成专业改造设计或施工依据。
        房屋结构安全、电气改造等涉及生命安全的项目，须由具备相应资质的专业机构现场勘查后出具正式方案。
        具体改造费用受地区、材料品牌、施工难度等因素影响，以实际报价为准。
        评估方不对因依据本报告进行改造而产生的一切后果承担责任。
      </p>
    </div>
  `;
  
  // 底部操作
  html += `
    <div class="nav-row" style="margin-top:24px">
      <button class="btn btn-secondary" onclick="goPhase('l2')">← 修改答案</button>
      <button class="btn btn-secondary" onclick="resetAll()" style="margin-left:8px">🔄 重新评估</button>
    </div>
  `;
  
  return html;
}

function resetAll(){
  if(!confirm('确定重新评估？所有答案将被清除。')) return;
  answers = {};
  leadSubmitted = false;
  goPhase('intro');
}

// ═══════════════════════════════════════════════════════════
// 留资功能
// ═══════════════════════════════════════════════════════════

function showLeadModal(){
  if(leadSubmitted){
    goPhase('report');
    return;
  }
  const modal = document.getElementById('leadModal');
  modal.style.display = 'flex';
  modal.onclick = function(e){ if(e.target === this) hideLeadModal(); };
  document.getElementById('modalForm').style.display = 'block';
  document.getElementById('modalSuccess').style.display = 'none';
  document.getElementById('leadError').style.display = 'none';
  document.getElementById('leadLoading').style.display = 'none';
  document.getElementById('leadName').value = '';
  document.getElementById('leadPhone').value = '';
}

function hideLeadModal(){
  document.getElementById('leadModal').style.display = 'none';
}

async function submitLead(){
  const name = document.getElementById('leadName').value.trim();
  const phone = document.getElementById('leadPhone').value.trim();
  const errorEl = document.getElementById('leadError');

  if(!name || name.length < 2){
    errorEl.textContent = '请输入真实姓名';
    errorEl.style.display = 'block';
    return;
  }
  if(!/^1\d{10}$/.test(phone)){
    errorEl.textContent = '请输入正确的11位手机号';
    errorEl.style.display = 'block';
    return;
  }

  errorEl.style.display = 'none';
  document.getElementById('leadLoading').style.display = 'block';

  // 收集评估数据
  const r = calcScore();
  const allAnswers = {};
  ALL_QUESTIONS.forEach(q => {
    if(answers[q.id] !== undefined){
      allAnswers[q.id] = {
        answer: q.options[answers[q.id]].label,
        score: q.options[answers[q.id]].score
      };
    }
  });

  try{
    const resp = await fetch(API_BASE + '/api/submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name,
        phone,
        score: r.score,
        grade: r.grade,
        answers: allAnswers,
        risks: [...r.risks.high, ...r.risks.mid]
      })
    });
    const data = await resp.json();
    document.getElementById('leadLoading').style.display = 'none';

    if(data.ok){
      leadSubmitted = true;
      document.getElementById('modalForm').style.display = 'none';
      document.getElementById('modalSuccess').style.display = 'block';
    } else {
      errorEl.textContent = data.error || '提交失败，请稍后重试';
      errorEl.style.display = 'block';
    }
  } catch(e){
    document.getElementById('leadLoading').style.display = 'none';
    errorEl.textContent = '网络错误，请检查连接后重试';
    errorEl.style.display = 'block';
  }
}

function showFullReport(){
  hideLeadModal();
  currentPhase = 'brief';
  render();
}

// ═══════════════════════════════════════════════════════════
// 简要报告（留资可见，完整版需专属顾问联系）
// ═══════════════════════════════════════════════════════════
function renderBriefReport(){
  const r = calcScore();

  const gradeLabels = {A:'🟢 A级 · 安全', B:'🟡 B级 · 关注', C:'🟠 C级 · 警示', D:'🔴 D级 · 紧急', E:'⚫ E级 · 不可居'};
  const gradeDesc = {A:'基本无隐患，日常注意即可', B:'存在1-2项中风险', C:'多项中高风险', D:'严重隐患，立即改造', E:'先做基础改造再做适老化'};

  const allRisks = [...r.risks.high, ...r.risks.mid];
  const topRisks = allRisks.slice(0, 3);

  return `
    <div class="question-card" style="text-align:center;padding:24px">
      <div style="font-size:13px;color:#888;margin-bottom:8px">${Object.keys(answers).length} / ${ALL_QUESTIONS.length} 题回答</div>
      <div class="grade-badge ${r.gradeClass}" style="margin-bottom:8px">
        ${gradeLabels[r.grade]}<br>
        <span style="font-size:14px;font-weight:400">${r.score} 分 · ${gradeDesc[r.grade]}</span>
      </div>
    </div>

    <div class="report-section">
      <h3>🚨 主要风险概览</h3>
      ${topRisks.length === 0 ? '<p style="color:#888;font-size:13px">您的居家安全状况整体良好</p>' : ''}
      ${topRisks.map(t => `<span class="risk-tag ${t.startsWith('🔴')?'risk-high':'risk-mid'}">${t}</span>`).join('')}
    </div>

    <div class="report-section" style="background:#fef7e0;border-left:4px solid #f9a825">
      <h3>📋 完整报告获取方式</h3>
      <p style="font-size:13px;line-height:1.7;margin:8px 0 4px">
        您的专属安全顾问将在<b>24小时内</b>与您联系，提供：
      </p>
      <ul style="font-size:13px;color:#555;line-height:1.8;padding-left:18px">
        <li>逐项安全评分及详细分析</li>
        <li>针对您住宅的定制改造方案</li>
        <li>改造预算分级建议</li>
        <li>当地适老化改造补贴政策参考</li>
      </ul>
    </div>

    <div class="report-section" style="background:#f5f9ff;border:1px solid #e0e0e0">
      <p style="font-size:13px;color:#888;line-height:1.6;text-align:center">
        💡 您也可以主动联系我们的顾问<br>
        <span style="font-size:16px;font-weight:500;color:#1a73e8">勇哥：1XX-XXXX-XXXX</span>
      </p>
    </div>

    <div class="nav-row" style="margin-top:24px">
      <button class="btn btn-secondary" onclick="goPhase('l2')">← 修改答案</button>
      <button class="btn btn-secondary" onclick="resetAll()" style="margin-left:8px">🔄 重新评估</button>
    </div>
  `;
}

// 启动
render();
</script>
